<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="{{{ PRODUCT_NAME }}}">
    <meta name="keywords" content="Energy8, WebGL, Unity, NFT, Crypto, Token, PlayToEarn, P2P, Bridge">
    <meta name="author" content="{{{ COMPANY_NAME }}}">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest" />
</head>

<body>
    <!-- Unity Container -->
    <div id="unity-container" class="unity-desktop" aria-hidden="true">
        <canvas id="unity-canvas" aria-label="Game canvas"></canvas>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" aria-label="Loading screen">
        <div id="loading-ring" class="loading-ring">
            <svg width="100%" height="100%" viewBox="0 0 100 100">
                <circle id="ring-background" cx="50" cy="50" r="45" stroke="#ddd" stroke-width="6" fill="none"></circle>
                <circle id="ring-progress" cx="50" cy="50" r="45" stroke="#7d3aed" stroke-width="6" fill="none"
                    stroke-dasharray="282.743" stroke-dashoffset="282.743"></circle>
            </svg>
            <img src="TemplateData/loadingIcon.png" alt="Unity Logo">
        </div>
    </div>

    <!-- Scripts -->
    <script src="TemplateData/utils.js"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script type="module" src="TemplateData/firebaseHandler.js"></script>
    <script src="TemplateData/telegramAuthHandler.js"></script>
    <script src="TemplateData/unityLoader.js"></script>
    <script src="TemplateData/debugInit.js"></script>
</body>



</html>

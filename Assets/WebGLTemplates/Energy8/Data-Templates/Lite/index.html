<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="{{{ PRODUCT_NAME }}} - Lite Version">
    <meta name="keywords" content="Energy8, WebGL, Unity, Mobile, Lite">
    <meta name="author" content="{{{ COMPANY_NAME }}}">
    <title>{{{ PRODUCT_NAME }}} Lite</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="stylesheet" href="TemplateData/lite-theme.css">
</head>

<body data-version="lite">
    <!-- Unity Container -->
    <div id="unity-container" class="unity-mobile" aria-hidden="true">
        <canvas id="unity-canvas" aria-label="Game canvas"></canvas>
    </div>

    <!-- Simplified Loading Screen -->
    <div id="loading-screen" aria-label="Loading screen">
        <div id="loading-ring" class="loading-ring-lite">
            <div class="simple-spinner"></div>
            <img src="TemplateData/loadingIcon.png" alt="Unity Logo">
        </div>
        <div id="loading-text" class="loading-text-lite">
            <p>Loading <span id="loading-dots">...</span></p>
            <div class="loading-percentage-lite">
                <span id="loading-percentage">0%</span>
            </div>
        </div>
    </div>

    <!-- Simple Progress Bar -->
    <div id="progress-container" class="progress-container-lite" style="display: none;">
        <div class="progress-bar-lite">
            <div id="progress-fill" class="progress-fill-lite"></div>
        </div>
        <div class="progress-text-lite">
            <span id="progress-percentage">0%</span>
        </div>
    </div>

    <!-- Portrait Mode Hint -->
    <div id="orientation-hint" class="orientation-hint" style="display: none;">
        <div class="hint-content">
            <div class="phone-portrait-icon">📱</div>
            <p>Best viewed in portrait mode</p>
        </div>
    </div>

    <!-- Minimal Warning Modal -->
    <div id="warning-modal" class="warning-modal-lite" style="display: none;" aria-hidden="true">
        <div class="warning-modal-content-lite">
            <div id="warning-message" aria-live="polite"></div>
            <div id="warning-buttons" class="warning-buttons-lite">
                <!-- Buttons will be added dynamically -->
            </div>
        </div>
    </div>

    <!-- Touch Controls Helper -->
    <div id="touch-helper" class="touch-helper" style="display: none;">
        <div class="touch-instruction">
            <span>👆 Tap to interact</span>
        </div>
    </div>

    <!-- Minimal Scripts -->
    <script src="TemplateData/warningModal.js"></script>
    <script src="TemplateData/orientationHandler.js"></script>
    <script src="TemplateData/touchHelper.js"></script>
    <script src="TemplateData/unityLoader.js"></script>

    <!-- Minimal Analytics -->
    <script>
        // Simplified analytics for lite version
        if (typeof gtag === 'undefined') {
            window.gtag = function() {
                // Lite version - minimal tracking
                console.log('Analytics:', arguments);
            };
        }
    </script>
</body>

</html>

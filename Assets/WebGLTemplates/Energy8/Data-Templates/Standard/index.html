<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="{{{ PRODUCT_NAME }}}">
    <meta name="keywords" content="Energy8, WebGL, Unity, NFT, Crypto, Token, PlayToEarn, P2P, Bridge">
    <meta name="author" content="{{{ COMPANY_NAME }}}">
    <title>{{{ PRODUCT_NAME }}}</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="stylesheet" href="TemplateData/standard-theme.css">
</head>

<body data-version="standard">
    <!-- Unity Container -->
    <div id="unity-container" class="unity-desktop" aria-hidden="true">
        <canvas id="unity-canvas" aria-label="Game canvas"></canvas>
    </div>

    <!-- Loading Screen -->
    <div id="loading-screen" aria-label="Loading screen">
        <div id="loading-ring" class="loading-ring">
            <svg width="100%" height="100%" viewBox="0 0 100 100">
                <circle id="ring-background" cx="50" cy="50" r="45" stroke="#ddd" stroke-width="6" fill="none"></circle>
                <circle id="ring-progress" cx="50" cy="50" r="45" stroke="#7d3aed" stroke-width="6" fill="none"
                    stroke-dasharray="282.743" stroke-dashoffset="282.743"></circle>
            </svg>
            <img src="TemplateData/loadingIcon.png" alt="Unity Logo">
        </div>
        <div id="loading-text" class="loading-text">
            <p>Loading... <span id="loading-percentage">0%</span></p>
            <div class="loading-details">
                <span id="loading-stage">Initializing</span>
            </div>
        </div>
    </div>

    <!-- Enhanced Progress Bar -->
    <div id="progress-container" class="progress-container" style="display: none;">
        <div class="progress-header">
            <h3 id="progress-title">Loading Game Assets</h3>
            <span id="progress-percentage">0%</span>
        </div>
        <div class="progress-bar">
            <div id="progress-fill" class="progress-fill"></div>
        </div>
        <div class="progress-details">
            <span id="progress-current-file">Preparing...</span>
            <span id="progress-speed"></span>
        </div>
    </div>

    <!-- Orientation Warning -->
    <div id="orientation-warning" class="orientation-warning" style="display: none;">
        <div class="orientation-content">
            <div class="orientation-icon">📱</div>
            <h3>Please Rotate Your Device</h3>
            <p>For the best experience, please use landscape orientation.</p>
            <div class="orientation-demo">
                <div class="phone-icon landscape-icon"></div>
            </div>
        </div>
    </div>

    <!-- Universal Warning Modal -->
    <div id="warning-modal" class="warning-modal" style="display: none;" aria-hidden="true">
        <div class="warning-modal-content">
            <div id="warning-message" aria-live="polite"></div>
            <div id="warning-buttons" class="warning-buttons">
                <!-- Buttons will be added dynamically -->
            </div>
        </div>
    </div>

    <!-- Performance Monitor (Standard version only) -->
    <div id="performance-monitor" class="performance-monitor" style="display: none;">
        <div class="perf-item">
            <span>FPS:</span>
            <span id="fps-counter">--</span>
        </div>
        <div class="perf-item">
            <span>Memory:</span>
            <span id="memory-usage">--</span>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script type="module" src="TemplateData/firebaseHandler.js"></script>
    <script src="TemplateData/telegramAuthHandler.js"></script>
    <script src="TemplateData/warningModal.js"></script>
    <script src="TemplateData/platformHandler.js"></script>
    <script src="TemplateData/orientationHandler.js"></script>
    <script src="TemplateData/progressManager.js"></script>
    <script src="TemplateData/performanceMonitor.js"></script>
    <script src="TemplateData/unityLoader.js"></script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-G4FMC73VHL"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-G4FMC73VHL');
    </script>
</body>

</html>
